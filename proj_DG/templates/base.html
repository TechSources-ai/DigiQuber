<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    </head>
    <body>
        <div class="container">
            {% include "nav.html" %}

            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mt-3" role="alert">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}

            {% block content %}{% endblock content %}
        </div>
        <script src="" async defer></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
          document.addEventListener("DOMContentLoaded", function () {
            const checkbox = document.getElementById("id_same_as_delivery");
            const bLine1 = document.getElementById("id_bLine1");
            const bLine2 = document.getElementById("id_bLine2");
            const bCity = document.getElementById("id_bCity");
            const bState = document.getElementById("id_bState");
            const bZip = document.getElementById("id_bZip");
            const dLine1 = document.getElementById("id_dLine1");
            const dLine2 = document.getElementById("id_dLine2");
            const dCity = document.getElementById("id_dCity");
            const dState = document.getElementById("id_dState");
            const dZip = document.getElementById("id_dZip");

            checkbox.addEventListener("change", function () {
              if (checkbox.checked) {
                id_dLine1.value = id_bLine1.value;
                id_dLine2.value = id_bLine2.value;
                id_dCity.value = id_bCity.value;
                id_dState.value = id_bState.value;
                id_dZip.value = id_bZip.value;
                id_dLine1.readOnly = true;  // Optional: lock field
                id_dLine2.readOnly = true;  // Optional: lock field
                id_dCity.readOnly = true;  // Optional: lock field
                id_dState.readOnly = true;  // Optional: lock field
                id_dZip.readOnly = true;  // Optional: lock field
              } else {
                id_dLine1.readOnly = false;
                id_dLine2.readOnly = false;
                id_dCity.readOnly = false;
                id_dState.readOnly = false;
                id_dZip.readOnly = false;
                id_dLine1.value = "";
                id_dLine2.value = "";
                id_dCity.value = "";
                id_dState.value = "";
                id_dZip.value = "";
              }
            });
          });
        </script>
    </body>
</html>
