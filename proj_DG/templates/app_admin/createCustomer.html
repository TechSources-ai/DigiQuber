{% extends "base.html" %}
{% block content %}
<body>
    <h1>Create Customer</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Reference Number</th>
                <th>Create Profile</th>
            </tr>
        </thead>
        <tbody>
            {% for customer in customers %}
            <tr>
                <td>{{ customer.name }}</td>
                <td>{{ customer.customerRefNo }}</td>
                <td>
                    <form method="post" action="{% url 'create_profile' customer.customerRefNo %}">
                        {% csrf_token %}
                        <button type="submit">Create</button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No users found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
{% endblock %}
