{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; padding: 2rem; margin: -1rem;">

  <div style="width: 100%; max-width: 420px;">

    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="width: 52px; height: 52px; background: #f4c542; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 500; color: #000; margin: 0 auto 1rem;">D</div>
      <h1 style="color: #fff; font-size: 22px; font-weight: 500; margin: 0 0 4px;">DigitalKuber</h1>
      <p style="color: #888; font-size: 14px; margin: 0;">Sign in to your account</p>
    </div>

    <div style="background: #111; border: 0.5px solid #2a2a2a; border-radius: 16px; padding: 2rem;">

      <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;">Email or Phone</label>
          <input type="text" name="email_or_phone" placeholder="you@example.com"
            style="width: 100%; box-sizing: border-box; background: #1a1a1a; border: 0.5px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 15px; outline: none;">
        </div>

        <div style="margin-bottom: 1.5rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label style="font-size: 13px; color: #aaa;">Password</label>
            <a href="#" style="font-size: 12px; color: #f4c542; text-decoration: none;">Forgot password?</a>
          </div>
          <input type="password" name="password" placeholder="••••••••"
            style="width: 100%; box-sizing: border-box; background: #1a1a1a; border: 0.5px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 15px; outline: none;">
        </div>

        {% if form.errors %}
          <div style="background: #2a1010; border: 0.5px solid #5a2020; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; color: #f08080; font-size: 13px;">
            Invalid credentials. Please try again.
          </div>
        {% endif %}

        <button type="submit" style="width: 100%; background: #f4c542; color: #000; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 500; cursor: pointer;">
          Sign In
        </button>

      </form>

    </div>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 13px; color: #555;">
      Don't have an account? <a href="{% url 'signup' %}" style="color: #f4c542; text-decoration: none;">Sign up</a>
    </p>

    <p style="text-align: center; margin-top: 1rem; font-size: 11px; color: #333;">
      Secured by SEBI · ISO 27001 · PCI DSS
    </p>

  </div>
</div>
{% endblock %}
