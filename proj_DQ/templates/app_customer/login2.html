<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f0f2f5;
    }
    .login-container {
      max-width: 400px;
      margin: auto;
      margin-top: 5vh;
      padding: 2rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    .social-btn {
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
      <strong>Attention!</strong> {{ errorMsg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <h4 class="text-center mb-4">Get Started</h4>

    <!-- Tab Selectors -->
    <ul class="nav nav-tabs mb-3" id="loginTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="email-tab" data-bs-toggle="tab" data-bs-target="#email" type="button" role="tab">Email</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="mobile-tab" data-bs-toggle="tab" data-bs-target="#mobile" type="button" role="tab">Mobile</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="reg-tab" data-bs-toggle="tab" data-bs-target="#reg" type="button" role="tab">Register</button>
      </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content" id="loginTabContent">
      <!-- Email Login -->
      <div class="tab-pane fade show active" id="email" role="tabpanel">
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
          </div>
          <div class="mb-3">
            <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMeEmail">
              <label class="form-check-label" for="rememberMeEmail">Remember Me</label>
            </div>
            <a href="#" class="small text-decoration-none">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login with Email</button>
        </form>
      </div>

      <!-- Mobile Login -->
      <div class="tab-pane fade" id="mobile" role="tabpanel">
        <form>
          {% csrf_token %}
          <div class="mb-3">
            <input type="tel" class="form-control" placeholder="Mobile Number" required>
          </div>
          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password / OTP" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMeMobile">
              <label class="form-check-label" for="rememberMeMobile">Remember Me</label>
            </div>
            <a href="#" class="small text-decoration-none">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login with Mobile</button>
        </form>
      </div>
      <!-- Register -->
      <div class="tab-pane fade" id="reg" role="tabpanel">
        <form action="{% url 'signup' %}" method="post">
          {% csrf_token %}
          <div class="mb-3">
            <input type="email" name="email" id="email" class="form-control" placeholder="Your active email" required>
          </div>
          <div class="mb-3">
            <input type="password" name="secret" id="secret" class="form-control" placeholder="Password" required>
          </div>
          <div class="mb-3">
            <input type="password" name="secret2" id="secret2" class="form-control" placeholder="Repete Password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register with Digital Kuber</button>
        </form>
      </div>
    </div>

    <div class="text-center mt-4 mb-2">
      <small class="text-muted">Or login with</small>
    </div>

    <!-- Social Buttons -->
    <div class="d-grid gap-2">
      <button class="btn btn-outline-danger social-btn"><i class="bi bi-google me-2"></i>Google</button>
    </div>
  </div>

  <!-- Bootstrap 5 JS + Icons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
